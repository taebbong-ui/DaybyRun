<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category page</title>
</head>
<style>
/* Pretendard Regular (weight 400) */
@font-face {
    font-family: "PretendardCustom";
    src: url("./fonts/Pretendard-Regular.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
}
@font-face {
    font-family: "LunchTime";
    src: url("./fonts/HakgyoansimJeomsimsiganB.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
      
            background: #111;           /* 바깥 배경 (앱 밖 영역) */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 앱 프레임 (393 x 852 기준) */
        .app {
            width: 100%;
            /* max-width: 393px;          */
            aspect-ratio: 393 / 852;    /* 비율 유지 */
            background: #e3e1d7;
            overflow: hidden;
            position: relative;  
        }

        .ref {
            position: absolute;
            inset: 0;              /* top:0; right:0; bottom:0; left:0; */
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /*----bar style-----*/

        .bar {
            position: absolute;
            left : 0;
            bottom : 0;
            width : 100%;
            /* max-width: 393px;          */
            aspect-ratio: 393 / 92.4286;    /* 비율 유지 */
            overflow: hidden;
            /* border : 1px solid red;  */
        }
        .belowBar {
            width: 100%;
            height: auto;     
            display: block;
        }
        .main-btn {
            position: absolute;
            top: 47.37%;
            left: 20.4%;
            width: 6%;
            height: auto;
            transform: translate(-50%, -50%);
        }
        .category-btn {
            position: absolute;
            top: 46.85%;
            left: 49.9%;
            width: 8.7%;
            height: auto;
            transform: translate(-50%, -50%);
        }
        .mypage-btn {
            position: absolute;
            top: 47%;
            left: 80.2%;
            width: 10.8%;
            height: auto;
            transform: translate(-50%, -50%);
        }


        .developing-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    font-family: "PretendardCustom", sans-serif;
    font-size: 18px;
    color: #51514f;

    opacity: 0.8;
}

</style>
<body>
    <div class="app">
    <!-- ====== 하단 네비게이션 바 ====== -->
        <div class="bar">
            <img src="./element/main home/SVG/below bar.svg" alt="below bar svg" class="belowBar" />
            <a href="main home.html" class="main-btn">
                <img src="./element/mypage/SVG/searchIcon.svg" alt="mainIcon svg">
            </a>
            <img src="/element/category/SVG/categoryIcon.svg" alt="categoryIcon svg" class="category-btn" />
            <a href="mypage.html" class="mypage-btn">
                <img src="/element/main home/SVG/mypageIcon.svg" alt="mypageIcon svg">
            </a>
        </div>


        <p class="developing-text">구현중입니다...</p>
    </div>
</body>
</html>
